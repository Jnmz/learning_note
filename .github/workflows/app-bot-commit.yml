name: Commit with GitHub App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  app-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository with App token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Make a test change
        run: |
          echo "updated at $(date -u)" >> BOT_TEST.txt

      - name: Commit and push as GitHub App
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

          git add BOT_TEST.txt
          git diff --cached --quiet && exit 0

          git commit -m "chore: test commit via GitHub App"
          git push
