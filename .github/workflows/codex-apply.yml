name: Codex Apply

on:
  workflow_dispatch:
    inputs:
      patch:
        description: Unified diff to apply before committing, or leave empty to only commit in-workflow edits
        required: false
        default: ""
        type: string
      commit_message:
        description: Commit message used when changed files are detected
        required: false
        default: "chore: apply automated repository updates"
        type: string
  workflow_call:
    inputs:
      patch:
        description: Unified diff to apply before committing, or leave empty to only commit in-workflow edits
        required: false
        default: ""
        type: string
      commit_message:
        description: Commit message used when changed files are detected
        required: false
        default: "chore: apply automated repository updates"
        type: string
    secrets:
      GH_APP_ID:
        required: true
      GH_APP_PRIVATE_KEY:
        required: true

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository with GitHub App token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure bot commit identity
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Apply Codex patch
        if: inputs.patch != ''
        env:
          PATCH_CONTENT: ${{ inputs.patch }}
        run: |
          printf '%s' "$PATCH_CONTENT" > /tmp/codex.patch
          git apply --whitespace=nowarn /tmp/codex.patch

      - name: Detect repository changes
        id: changes
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push repository updates
        if: steps.changes.outputs.has_changes == 'true'
        env:
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "$COMMIT_MESSAGE"
          git push

      - name: No changes to apply
        if: steps.changes.outputs.has_changes != 'true'
        run: echo "No repository changes were detected."
