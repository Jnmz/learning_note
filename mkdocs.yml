site_name: 学习笔记
site_description: 面向 AI / ML 研究、模型与系统的技术学习笔记。
site_url: https://jnmz.github.io/learning_note/
repo_url: https://github.com/jnmz/learning_note
repo_name: jnmz/learning_note
docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  font:
    text: Source Serif 4
    code: JetBrains Mono
  palette:
    - scheme: default
      primary: white
      accent: blue grey
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 首页: index.md
  - 主题:
      - 统一模型:
          - unified-models/index.md
          - 统一多模态模型总览: unified-models/unified-multimodal-models-overview.md
          - DreamLLM 笔记: unified-models/dreamllm-notes.md
          - Emu3 笔记: unified-models/emu3-notes.md
          - Janus 笔记: unified-models/janus-notes.md
          - Transfusion 笔记: unified-models/transfusion-notes.md
          - Orthus 笔记: unified-models/orthus-notes.md
          - Chameleon 笔记: unified-models/chameleon-notes.md
          - MMaDA 笔记: unified-models/mmada-notes.md
          - LLaDA-o 笔记: unified-models/llada-o-notes.md
          - Uni-RS 笔记: unified-models/uni-rs-notes.md
          - Show-o 笔记: unified-models/show-o-notes.md
          - Show-o2 笔记: unified-models/show-o2-notes.md
          - TUNA 笔记: unified-models/tuna-notes.md
      - 视觉语言模型:
          - vlm/index.md
          - VLM 阅读地图: vlm/vlm-reading-map.md
      - 生成建模:
          - generative-modeling/index.md
          - 扩散模型导读: generative-modeling/diffusion-primer.md
          - DDPM 笔记: generative-modeling/ddpm-notes.md
          - Score Matching 笔记: generative-modeling/score-matching-notes.md
          - Flow Matching 笔记: generative-modeling/flow-matching-notes.md
          - VAE 与 ELBO 笔记: generative-modeling/vae-elbo-notes.md
  - 写作说明:
      - 贡献指南: contributing.md
      - 笔记模板: workflows/note-template.md
