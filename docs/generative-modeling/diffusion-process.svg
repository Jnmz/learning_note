<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">Diffusion process overview</title>
  <desc id="desc">A simple diagram showing a forward noising path from data to Gaussian noise and a reverse learned path back to data.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fbfd"/>
      <stop offset="100%" stop-color="#eef3f6"/>
    </linearGradient>
    <linearGradient id="forward" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#2f5d7c"/>
      <stop offset="100%" stop-color="#89a9bf"/>
    </linearGradient>
    <linearGradient id="reverse" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#b4684d"/>
      <stop offset="100%" stop-color="#d59b7c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#b8c5cf" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="920" height="260" rx="24" fill="url(#bg)"/>

  <text x="70" y="54" font-family="JetBrains Mono, monospace" font-size="20" fill="#244357">Forward process</text>
  <text x="70" y="84" font-family="Source Serif 4, Georgia, serif" font-size="15" fill="#4d6271">Gradually corrupt data with Gaussian noise</text>

  <text x="70" y="182" font-family="JetBrains Mono, monospace" font-size="20" fill="#8d533e">Reverse process</text>
  <text x="70" y="212" font-family="Source Serif 4, Georgia, serif" font-size="15" fill="#705548">Learn denoising dynamics from noise back to data</text>

  <g filter="url(#shadow)">
    <rect x="80" y="104" width="120" height="42" rx="21" fill="#ffffff"/>
    <rect x="290" y="104" width="120" height="42" rx="21" fill="#ffffff"/>
    <rect x="500" y="104" width="120" height="42" rx="21" fill="#ffffff"/>
    <rect x="710" y="104" width="140" height="42" rx="21" fill="#ffffff"/>
  </g>

  <text x="117" y="130" font-family="JetBrains Mono, monospace" font-size="18" fill="#1f2933">x_0</text>
  <text x="320" y="130" font-family="JetBrains Mono, monospace" font-size="18" fill="#1f2933">x_t</text>
  <text x="528" y="130" font-family="JetBrains Mono, monospace" font-size="18" fill="#1f2933">...</text>
  <text x="740" y="130" font-family="JetBrains Mono, monospace" font-size="18" fill="#1f2933">x_T ~ N(0, I)</text>

  <path d="M205 125 C235 125 255 125 285 125" fill="none" stroke="url(#forward)" stroke-width="7" stroke-linecap="round"/>
  <path d="M415 125 C445 125 465 125 495 125" fill="none" stroke="url(#forward)" stroke-width="7" stroke-linecap="round"/>
  <path d="M625 125 C655 125 675 125 705 125" fill="none" stroke="url(#forward)" stroke-width="7" stroke-linecap="round"/>

  <polygon points="284,117 300,125 284,133" fill="#7a9ab0"/>
  <polygon points="494,117 510,125 494,133" fill="#7a9ab0"/>
  <polygon points="704,117 720,125 704,133" fill="#7a9ab0"/>

  <path d="M720 168 C660 192 590 210 520 214 C390 221 260 214 194 180" fill="none" stroke="url(#reverse)" stroke-width="8" stroke-linecap="round"/>
  <polygon points="205,171 184,179 198,195" fill="#b4684d"/>

  <text x="365" y="170" font-family="Source Serif 4, Georgia, serif" font-size="15" fill="#516677">q(x_t | x_{t-1})</text>
  <text x="382" y="204" font-family="Source Serif 4, Georgia, serif" font-size="15" fill="#8d533e">p_theta(x_{t-1} | x_t)</text>
</svg>
